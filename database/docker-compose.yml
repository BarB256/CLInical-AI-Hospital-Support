version: '3.8'

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicalai-db
    environment:
      POSTGRES_USER: clinicalai
      POSTGRES_PASSWORD: clinicalai
      POSTGRES_DB: clinicalai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicalai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: