name: Next.js Lint

on:
  pull_request:
    paths:
      - "**.ts"
      - "**.tsx"

concurrency:
  group: nextjs-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  nextjs-lint:
    name: Next.js Golden Rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings=0